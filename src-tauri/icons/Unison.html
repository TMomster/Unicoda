<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极光矩形 · 字母U · 思源黑体</title>
    <style>
        /* 全局重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* 深蓝色背景 —— 静谧夜空 */
            background-color: #0a1128;
            /* 极光风格渐变：从深蓝过渡到青绿、紫粉、淡蓝 */
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(10, 30, 80, 0.9) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(60, 10, 80, 0.6) 0%, transparent 35%),
                radial-gradient(circle at 40% 80%, rgba(0, 100, 120, 0.5) 0%, transparent 30%),
                radial-gradient(circle at 70% 20%, rgba(20, 60, 130, 0.7) 0%, transparent 45%),
                linear-gradient(145deg, #0b1a3a 0%, #0f2847 30%, #1a3b5c 60%, #2a4a6a 80%, #0f1f3a 100%);
            background-blend-mode: normal, overlay, screen, soft-light, normal;
            background-size: 100% 100%, 150% 150%, 120% 120%, 180% 180%, cover;
            background-position: 0 0, -20% -10%, 10% 20%, 30% -10%, 0 0;
            background-repeat: no-repeat;
        }

        /* 正比例矩形 —— 宽高比 1:1，无圆角，无条纹 */
        .aurora-rectangle {
            width: 60vmin;
            height: 60vmin;
            max-width: 90vw;
            max-height: 90vh;
            background: 
                /* 极光风格渐变 */
                radial-gradient(circle at 15% 25%, rgba(70, 200, 255, 0.7) 0%, rgba(20, 80, 200, 0.3) 30%, transparent 55%),
                radial-gradient(circle at 85% 65%, rgba(200, 100, 255, 0.6) 0%, rgba(150, 40, 200, 0.2) 25%, transparent 50%),
                radial-gradient(circle at 40% 70%, rgba(0, 255, 200, 0.5) 0%, rgba(0, 180, 160, 0.2) 30%, transparent 55%),
                radial-gradient(circle at 70% 30%, rgba(100, 220, 255, 0.6) 0%, rgba(30, 120, 220, 0.2) 35%, transparent 50%),
                linear-gradient(135deg, #0b2b5e 0%, #1a4b7a 25%, #3a6a9a 50%, #5a3a7a 75%, #2a4a7a 100%);
            background-blend-mode: overlay, screen, lighten, normal, normal;
            /* 边缘柔光，无圆角 */
            box-shadow: 
                0 0 60px rgba(20, 100, 200, 0.3),
                inset 0 0 80px rgba(10, 200, 255, 0.15),
                inset 0 0 30px rgba(150, 80, 255, 0.2);
            border-radius: 0;
            position: relative;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 光晕叠加层（无条纹） */
        .aurora-rectangle::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 0;
            background: 
                radial-gradient(ellipse at 30% 40%, rgba(120, 255, 220, 0.25) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 60%, rgba(200, 150, 255, 0.2) 0%, transparent 40%),
                radial-gradient(ellipse at 50% 80%, rgba(100, 200, 255, 0.15) 0%, transparent 45%);
            pointer-events: none;
            z-index: 1;
        }

        /* 字母U — 仅使用思源黑体，不加任何回退字体 */
        .aurora-rectangle .letter-u {
            position: relative;
            z-index: 2;
            /* 仅指定思源黑体，无任何后备字体 */
            font-family: "Source Han Sans SC", "Source Han Sans";
            font-weight: 900;          /* 加粗 */
            font-size: 30vmin;
            line-height: 1;
            color: #ffffff;
            text-shadow: 
                0 0 20px rgba(255, 255, 255, 0.3),
                0 0 60px rgba(200, 220, 255, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            font-style: normal;
            letter-spacing: 0;
            margin: 0;
            padding: 0;
        }

        /* 确保没有任何额外文本 */
        .aurora-rectangle *:not(.letter-u) {
            font-size: 0;
            color: transparent;
            text-indent: -9999px;
        }

        /* 响应式调整字母大小 */
        @media (max-width: 600px) {
            .aurora-rectangle .letter-u {
                font-size: 25vmin;
            }
        }
        @media (max-width: 400px) {
            .aurora-rectangle .letter-u {
                font-size: 20vmin;
            }
        }
    </style>
</head>
<body>
    <!-- 正比例矩形：极光背景，无圆角，无条纹，中央显示白色字母U（仅思源黑体加粗） -->
    <div class="aurora-rectangle" role="img" aria-label="极光风格矩形，中央字母U">
        <span class="letter-u">U</span>
    </div>
</body>
</html>
